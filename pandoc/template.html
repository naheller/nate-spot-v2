<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        $if(title)$
        <title>$title$ - nate.spot</title>
        $else$
        <title>nate.spot</title>
        $endif$
        <meta name="generator" content="pandoc" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, user-scalable=yes"
        />
        <meta name="author" content="Nathan Heller" />
        <meta name="format-detection" content="telephone=no" />
        <link rel="stylesheet" href="/styles/normalize.css" />
        <link rel="stylesheet" href="/styles/styles.css" />
    </head>
    <body>
        $for(include-before)$ $include-before$ $endfor$
        <main>
            <div id="note-content">
                $if(title)$
                <h1>$title$</h1>
                $endif$ $body$
            </div>
            <div id="note-meta">
                $if(tags)$
                <p>
                    <span>Tagged:</span>
                    $for(tags)$
                    <a href="/tags/$tags$">$tags$</a>
                    $endfor$
                </p>
                $endif$ $if(updated_at)$
                <p>
                    Last updated:
                    <time datetime="$updated_at$">$updated_at$</time>
                </p>
                $endif$
            </div>
        </main>
        $for(include-after)$ $include-after$ $endfor$
    </body>
</html>
